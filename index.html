<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task Board</title>
</head>
<body>
   <header>
    <h1>My Task Board <span id="taskCounter">0</span></h1>

    <label for="priorityFilter">Filter Priority:</label>
    <select id="priorityFilter">
        <option value="all">All</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>
</header> 

<main>

    <section id="todo">
        <h2>To Do</h2>
        <button data-column="todo">Add Task</button>
        <ul id="todoList"></ul>
    </section>

    <section id="inprogress">
        <h2>In Progress</h2>
        <button data-column="inprogress">Add Task</button>
        <ul id="inprogressList"></ul>
    </section>

    <section id="done">
        <h2>Done</h2>
        <button data-column="done">Add Task</button>
        <button id="clearDone">Clear All</button>
        <ul id="doneList"></ul>
    </section>

</main>

</body>
</html>
