<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <header>
    <h1>My Task Board <span id="taskCounter">0</span></h1>

    <label for="priorityFilter">Filter Priority:</label>
    <select id="priorityFilter">
        <option value="all">All</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>
</header> 

<main>

    <section id="todo">
        <h2>To Do</h2>
        <button data-column="todo">Add Task</button>
        <ul id="todoList"></ul>
    </section>

    <section id="inprogress">
        <h2>In Progress</h2>
        <button data-column="inprogress">Add Task</button>
        <ul id="inprogressList"></ul>
    </section>

    <section id="done">
        <h2>Done</h2>
        <button data-column="done">Add Task</button>
        <button id="clearDone">Clear All</button>
        <ul id="doneList"></ul>
    </section>

</main>

<div id="taskModal" class="hidden">

    <div class="modal-content">

        <h2>Add / Edit Task</h2>

        <input type="text" id="taskTitle" placeholder="Title">

        <textarea id="taskDesc" placeholder="Description"></textarea>

        <select id="taskPriority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>

        <input type="date" id="taskDueDate">

        <button id="saveTask">Save</button>
        <button id="cancelTask">Cancel</button>

    </div>

</div>

</body>
</html>
